<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>美式躲避球：戰術抉擇體驗</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #111827; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            touch-action: none; 
        }
        #game-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background-color: #1a202c; 
        }
        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
        }
        
        /* 手機版對話框與選項 UI (緊湊版) */
        #dialog-layer { 
            position: absolute; 
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-end; 
            pointer-events: none; 
            padding: 10px; 
            z-index: 10; 
            padding-bottom: max(10px, env(safe-area-inset-bottom)); 
        }
        .dialog-box { 
            background: rgba(17, 24, 39, 0.95); 
            border: 2px solid #FBBF24; 
            border-radius: 12px; 
            padding: 12px 14px; 
            box-shadow: 0 -8px 30px rgba(0,0,0,0.6); 
            pointer-events: auto; 
            transform: translateY(120%); 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            max-height: 65vh; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            transform-origin: bottom center; 
        }
        .dialog-box.show { 
            transform: translateY(0) scale(1); 
            opacity: 1; 
        }
        .dialog-box.show.shrunk { 
            transform: translateY(10px) scale(0.85); 
            opacity: 0.65; 
            pointer-events: none; 
            border-color: rgba(251, 191, 36, 0.5);
        }
        
        .choice-btn { 
            background: #374151; 
            border: 1px solid #4B5563; 
            color: white; 
            padding: 10px 14px; 
            border-radius: 8px; 
            margin-top: 8px; 
            width: 100%; 
            text-align: left; 
            transition: all 0.2s; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            font-size: 14px; 
        }
        .choice-btn:active { background: #4B5563; border-color: #FBBF24; transform: scale(0.98); }
        
        .choice-btn .number { 
            background: #FBBF24; 
            color: black; 
            font-weight: bold; 
            width: 22px; 
            height: 22px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-right: 10px; 
            flex-shrink: 0; 
            font-size: 13px; 
        }

        .coach-avatar { 
            width: 40px; 
            height: 40px; 
            background: #EF4444; 
            border-radius: 50%; 
            border: 2px solid white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 20px; 
            margin-right: 10px; 
            flex-shrink: 0; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        #dialog-text {
            font-size: 14px;
            line-height: 1.5;
        }

        /* 關卡選單特化 */
        .level-btn {
            background: rgba(37, 99, 235, 0.8);
            border: 2px solid #3B82F6;
            padding: 12px 20px;
            border-radius: 12px;
            margin-bottom: 12px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .level-btn:active { transform: scale(0.95); filter: brightness(1.2); }

    </style>
</head>
<body>

    <div id="game-container">
        <!-- 遊戲畫布 -->
        <canvas id="gameCanvas"></canvas>
        
        <!-- 劇情對話與選擇層 -->
        <div id="dialog-layer">
            <div id="dialog-box" class="dialog-box mx-auto w-full max-w-md">
                <div class="flex items-start mb-1 relative">
                    <div class="coach-avatar">👨‍🏫</div>
                    <div class="flex-1">
                        <div class="flex justify-between items-center">
                            <h3 class="text-yellow-400 font-bold text-[14px] mb-1">戰術教練</h3>
                        </div>
                        <p id="dialog-text" class="text-gray-100">歡迎來到美式躲避球戰術板！</p>
                    </div>
                </div>

                <div id="choices-container" class="mt-1 hidden flex-col">
                    <!-- 選項按鈕會透過 JS 動態產生 -->
                </div>
                <button id="next-btn" class="mt-3 bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-2 px-6 rounded-full self-end ml-auto block shadow-lg text-[14px]">
                    繼續
                </button>
            </div>
        </div>

        <!-- 標題畫面 / 關卡選擇 -->
        <div id="title-screen" class="absolute inset-0 bg-gray-900/95 flex flex-col items-center justify-center pointer-events-auto z-50 p-6 overflow-y-auto">
            <div class="text-5xl mb-3 mt-4">🏐</div>
            <h1 class="text-3xl font-bold text-yellow-400 mb-2 text-center leading-tight">美式躲避球<br><span class="text-xl text-white">戰術抉擇體驗</span></h1>
            <p class="text-gray-300 text-center mb-6 text-[14px] leading-relaxed">
                模擬真實賽場局勢。<br>你需要根據規則，做出最正確的判斷！
            </p>
            
            <div class="w-full flex flex-col items-center mt-2">
                <button class="level-btn bg-gray-600 border-gray-400" onclick="startGame('basic_abcd')">
                    基礎篇：ABCD核心 與 誠實制
                </button>
                <button class="level-btn bg-blue-600 border-blue-400" onclick="startGame('intro')">
                    第一關：開局與基礎攻防 (6v6)
                </button>
                <button class="level-btn bg-purple-600 border-purple-400" onclick="startGame('level2_intro')">
                    第二關：進階觀念與危機 (中盤)
                </button>
                <button class="level-btn bg-green-600 border-green-400" onclick="startGame('level3_intro')">
                    第三關：彈射球與團隊救援
                </button>
                <button class="level-btn bg-orange-600 border-orange-400" onclick="startGame('level4_intro')">
                    第四關：攻擊戰術與暗號
                </button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI 元素
    const dialogBox = document.getElementById('dialog-box');
    const dialogText = document.getElementById('dialog-text');
    const choicesContainer = document.getElementById('choices-container');
    const nextBtn = document.getElementById('next-btn');
    const titleScreen = document.getElementById('title-screen');

    // 視窗與排球場尺寸設定
    let COURT_WIDTH, COURT_HEIGHT;
    let CENTER_Y; 
    let ATTACK_LINE_P1_Y; 
    let ATTACK_LINE_P2_Y; 
    let courtDrawX, courtDrawY, courtDrawW, courtDrawH;

    function resizeCanvas() {
        COURT_WIDTH = window.innerWidth;
        COURT_HEIGHT = window.innerHeight;
        canvas.width = COURT_WIDTH;
        canvas.height = COURT_HEIGHT;
        
        CENTER_Y = COURT_HEIGHT / 2;
        
        let marginX = COURT_WIDTH * 0.05;
        let marginY = COURT_HEIGHT * 0.08;
        courtDrawW = COURT_WIDTH - marginX * 2;
        
        if(courtDrawW > 500) {
            courtDrawW = 500;
            marginX = (COURT_WIDTH - 500) / 2;
        }
        courtDrawH = COURT_HEIGHT - marginY * 2;
        courtDrawX = marginX;
        courtDrawY = marginY;

        let halfCourtH = courtDrawH / 2;
        ATTACK_LINE_P1_Y = CENTER_Y + halfCourtH * 0.33; 
        ATTACK_LINE_P2_Y = CENTER_Y - halfCourtH * 0.33; 

        drawScene();
    }
    
    window.addEventListener('resize', resizeCanvas);

    // --- 動畫與狀態系統 ---
    let isAnimating = false;
    let currentAnimation = null;
    let animationTimer = 0;
    
    // 陣容與球
    let teamBlue = [];
    let teamRed = [];
    let balls = []; 
    
    let pObj = null; 
    let eObj = null; 
    let tObj = null; 
    let outTeammate = null; 
    
    let currentScenarioNode = null;
    let loopRunning = false; 

    resizeCanvas();

    // --- 繪圖邏輯 ---
    function drawScene() {
        ctx.fillStyle = '#111827';
        ctx.fillRect(0, 0, COURT_WIDTH, COURT_HEIGHT);
        
        ctx.fillStyle = '#db9c6e'; 
        ctx.fillRect(courtDrawX, courtDrawY, courtDrawW, courtDrawH);
        
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#FFFFFF';
        ctx.strokeRect(courtDrawX, courtDrawY, courtDrawW, courtDrawH);

        ctx.beginPath();
        ctx.moveTo(courtDrawX, CENTER_Y);
        ctx.lineTo(courtDrawX + courtDrawW, CENTER_Y);
        ctx.lineWidth = 6;
        ctx.strokeStyle = '#FFFFFF';
        ctx.stroke();

        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(courtDrawX, ATTACK_LINE_P2_Y);
        ctx.lineTo(courtDrawX + courtDrawW, ATTACK_LINE_P2_Y);
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
        ctx.stroke();
        
        ctx.beginPath();
        ctx.moveTo(courtDrawX, ATTACK_LINE_P1_Y);
        ctx.lineTo(courtDrawX + courtDrawW, ATTACK_LINE_P1_Y);
        ctx.stroke();

        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.font = '12px Arial';
        ctx.textAlign = 'right';
        ctx.fillText('3米啟動線', courtDrawX + courtDrawW - 10, ATTACK_LINE_P1_Y + 18);
        ctx.fillText('3米啟動線', courtDrawX + courtDrawW - 10, ATTACK_LINE_P2_Y - 8);

        ctx.fillStyle = 'rgba(239, 68, 68, 0.1)'; 
        ctx.fillRect(courtDrawX, courtDrawY, courtDrawW, courtDrawH / 2);
        ctx.fillStyle = 'rgba(59, 130, 246, 0.1)'; 
        ctx.fillRect(courtDrawX, CENTER_Y, courtDrawW, courtDrawH / 2);

        balls.forEach(b => { if (!b.isHeld && !b.thrown && !b.hidden) drawBall(b.x, b.y); });
        balls.forEach(b => { if (b.thrown) drawBall(b.x, b.y, true); });

        teamRed.forEach(char => { drawCharacter(char); });
        teamBlue.forEach(char => { drawCharacter(char); });
    }

    function drawCharacter(char) {
        ctx.save();
        
        if (char.isOut) {
            ctx.globalAlpha = 0.3;
            if (char.team === 'blue') {
                ctx.translate(courtDrawX - 20, courtDrawY + courtDrawH - 40);
            } else {
                ctx.translate(courtDrawX + courtDrawW + 20, courtDrawY + 40);
            }
        } else {
            ctx.translate(char.x, char.y);
        }
        
        ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2);
        ctx.fillStyle = char.color; ctx.fill();
        ctx.lineWidth = char.isUser ? 3 : 2; 
        ctx.strokeStyle = char.isUser ? '#FBBF24' : '#FFF'; 
        ctx.stroke();
        
        // 持球繪製邏輯
        if (char.hasBall) {
            ctx.beginPath(); 
            let ballOffsetX = 12;
            let ballOffsetY = char.team === 'red' ? 10 : -10; 
            ctx.arc(ballOffsetX, ballOffsetY, 7, 0, Math.PI*2);
            ctx.fillStyle = '#F97316'; ctx.fill(); ctx.stroke();
            
            // 第四關特殊邏輯：若玩家持有兩顆球，畫在另一側
            if (char.ballCount > 1) {
                ctx.beginPath(); 
                ctx.arc(-ballOffsetX, ballOffsetY, 7, 0, Math.PI*2);
                ctx.fillStyle = '#F97316'; ctx.fill(); ctx.stroke();
            }
        }

        ctx.fillStyle = 'white';
        if (char.team === 'red') {
            ctx.beginPath(); ctx.arc(-5, 6, 2.5, 0, Math.PI*2); ctx.arc(5, 6, 2.5, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.beginPath(); ctx.arc(-5, -6, 2.5, 0, Math.PI*2); ctx.arc(5, -6, 2.5, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
        
        if (char.name && !char.isOut) {
            ctx.fillStyle = char.isUser ? '#FBBF24' : '#FFF';
            ctx.font = 'bold 12px Arial'; 
            ctx.textAlign = 'center';
            let textY = char.team === 'red' ? char.y - 22 : char.y + 26;
            ctx.fillText(char.name, char.x, textY);
        }
    }

    function drawBall(x, y, isFlying = false) {
        ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2);
        ctx.fillStyle = '#F97316'; ctx.fill();
        ctx.lineWidth = 1; ctx.strokeStyle = '#000'; ctx.stroke();
        if (isFlying) {
            ctx.beginPath(); ctx.arc(x, y, 9, 0, Math.PI*2);
            ctx.fillStyle = 'rgba(249, 115, 22, 0.3)'; ctx.fill();
        }
    }

    // --- 全局 0.5倍速 雙核物理引擎 ---
    function easeInOutQuad(t) { return t<.5 ? 2*t*t : -1+(4-2*t)*t; }

    function animateLoop() {
        let stillAnimating = false;

        if (isAnimating && currentAnimation) {
            animationTimer += 0.5; 
            let progress = currentAnimation.duration > 0 ? animationTimer / currentAnimation.duration : 1;
            if (progress > 1) progress = 1;

            let easedProgress = easeInOutQuad(progress);
            if (currentAnimation.onFrame) currentAnimation.onFrame(easedProgress);

            if (progress === 1) {
                isAnimating = false;
                if (currentAnimation.onComplete) currentAnimation.onComplete();
            } else {
                stillAnimating = true;
            }
        }

        let ballsFlying = false;
        if (balls.some(b => b.thrown)) {
            ballsFlying = true;
            balls.forEach(b => {
                if (b.thrown) {
                    b.x += b.vx * 0.5; 
                    b.y += b.vy * 0.5;
                    
                    let hitTarget = null;
                    let allChars = [...teamBlue, ...teamRed];
                    for (let char of allChars) {
                        if (!char.isOut && char !== b.thrower && Math.hypot(char.x - b.x, char.y - b.y) < 20) {
                            hitTarget = char; 
                            break;
                        }
                    }

                    if (hitTarget) {
                        b.thrown = false; 
                        let anim = currentAnimation;
                        currentAnimation = null; 
                        if (anim && anim.onHit) anim.onHit(hitTarget);
                    } else if (b.y > courtDrawY + courtDrawH || b.y < courtDrawY || b.x < courtDrawX || b.x > courtDrawX + courtDrawW) {
                        b.thrown = false; 
                        let anim = currentAnimation;
                        currentAnimation = null; 
                        if (anim && anim.onMiss) anim.onMiss();
                    }
                }
            });
        }

        drawScene();

        if (stillAnimating || ballsFlying) {
            loopRunning = true;
            requestAnimationFrame(animateLoop);
        } else {
            loopRunning = false;
        }
    }

    function playAnimation(animDef) {
        currentAnimation = animDef;
        animationTimer = 0;
        isAnimating = true;
        if (!loopRunning) {
            loopRunning = true;
            requestAnimationFrame(animateLoop);
        }
    }

    // --- 劇本庫 ---
    const scenarios = {
        // ==========================================
        // 基礎篇：ABCD核心 與 誠實制 (Honor System)
        // ==========================================
        basic_abcd: {
            setup: () => {
                teamBlue = []; teamRed = []; balls = [];
                
                let px = courtDrawX + courtDrawW / 2;
                let py = courtDrawY + courtDrawH - 50;
                pObj = { x: px, y: py, color: '#3B82F6', hasBall: false, ballCount: 0, isOut: false, team: 'blue', isUser: true, name: '你' };
                teamBlue.push(pObj);

                let ex = courtDrawX + courtDrawW / 2;
                let ey = courtDrawY + 50;
                eObj = { x: ex, y: ey, color: '#EF4444', hasBall: true, ballCount: 1, isOut: false, team: 'red', isUser: false, name: '對手' };
                teamRed.push(eObj);

                balls.push({x: eObj.x, y: eObj.y, isHeld: true, thrown: false, vx:0, vy:0, id: 0, thrower: eObj, hidden: false});
                
                tObj = null; outTeammate = null;
                drawScene();
            },
            dialog: "【基礎篇：ABCD 四大核心】<br>上場前，先牢記美式躲避球的四個基本動作：<br>🎯 <b>A</b>ttack (攻擊)：丟球淘汰對手<br>🛡️ <b>B</b>lock (擋擊)：用手上的球擋開攻擊<br>🤲 <b>C</b>atch (接球)：徒手接住攻擊<br>💨 <b>D</b>odge (閃避)：靈活躲開飛來的球",
            action: () => { loadScenario('basic_outs'); }
        },
        basic_outs: {
            setup: () => { drawScene(); },
            dialog: "【基礎篇：四大出局條件】<br>在場上，如果你發生以下 4 種情況，就會被判定出局 (Out) 喔：<br><br>1️⃣ <b>被擊中</b>：身體或衣物被活球直接砸中。<br>2️⃣ <b>被接殺</b>：你丟出去的球，在落地前被對手接住。<br>3️⃣ <b>踩線</b>：腳踩到或越過白色的邊界線/中線。<br>4️⃣ <b>掉球</b>：用手上的球去擋，但手上的球卻不小心被打落。",
            action: () => { loadScenario('basic_intro'); }
        },
        basic_intro: {
            setup: () => { 
                // 修正：完整重置場景與球權，確保重新挑戰時球回到對手手上
                teamBlue = []; teamRed = []; balls = [];
                let px = courtDrawX + courtDrawW / 2;
                let py = courtDrawY + courtDrawH - 50;
                pObj = { x: px, y: py, color: '#3B82F6', hasBall: false, ballCount: 0, isOut: false, team: 'blue', isUser: true, name: '你' };
                teamBlue.push(pObj);

                let ex = courtDrawX + courtDrawW / 2;
                let ey = courtDrawY + 50;
                eObj = { x: ex, y: ey, color: '#EF4444', hasBall: true, ballCount: 1, isOut: false, team: 'red', isUser: false, name: '對手' };
                teamRed.push(eObj);

                balls.push({x: eObj.x, y: eObj.y, isHeld: true, thrown: false, vx:0, vy:0, id: 0, thrower: eObj, hidden: false});
                
                tObj = null; outTeammate = null;
                drawScene(); 
            },
            dialog: "【基礎篇：誠實制】<br>除了 ABCD 技巧，這項運動真正的靈魂是：「誠實 (Honor System)」。<br><br>現在對手朝你丟了一顆球...",
            action: () => {
                dialogBox.classList.add('shrunk');
                choicesContainer.style.display = 'none';

                eObj.hasBall = false; eObj.ballCount = 0;
                balls[0].isHeld = false; balls[0].thrown = true; balls[0].thrower = eObj;
                let angle = Math.atan2(pObj.y - eObj.y, pObj.x - eObj.x);
                balls[0].vx = Math.cos(angle) * 15; balls[0].vy = Math.sin(angle) * 15;

                let resolved = false;
                playAnimation({
                    duration: 999,
                    onHit: (t) => {
                        if(resolved) return; resolved = true;
                        balls[0].thrown = false; balls[0].x = pObj.x + 15; balls[0].y = pObj.y + 15;
                        loadScenario('basic_decision');
                    },
                    onMiss: () => {
                        // 加入防呆安全鎖：萬一物理引擎判定出界，強制觸發劇情
                        if(resolved) return; resolved = true;
                        balls[0].thrown = false; balls[0].x = pObj.x + 15; balls[0].y = pObj.y + 15;
                        loadScenario('basic_decision');
                    }
                });
            }
        },
        basic_decision: {
            dialog: "【暫停】<br>球輕輕擦過了你的衣服邊緣，然後掉在地上。裁判的視線剛好被擋住，**他沒有看到你被擊中**。<br>你要怎麼做？",
            choices: [
                {
                    text: "假裝沒事，繼續留在場上比賽",
                    action: () => { 
                        dialogBox.classList.remove('show'); 
                        setTimeout(() => { loadScenario('fail_honesty'); }, 300); 
                    }
                },
                {
                    text: "主動舉手大喊「Out!」，並走向場外",
                    action: () => {
                        dialogBox.classList.add('shrunk');
                        choicesContainer.style.display = 'none';
                        pObj.isOut = true; 
                        drawScene();
                        setTimeout(() => { loadScenario('success_honesty'); }, 300);
                    }
                }
            ]
        },
        fail_honesty: {
            dialog: "❌ 絕對不行！<br>美式躲避球是一項紳士運動，極度仰賴球員的**「誠實 (Honor)」**。<br>只要被球擊中（包含衣服、頭髮），哪怕裁判沒看到，也必須主動承認！這嚴重違反了躲避球的精神！",
            choices: [{ text: "重新選擇", action: () => { dialogBox.classList.remove('show'); setTimeout(() => { loadScenario('basic_intro'); }, 300); } }]
        },
        success_honesty: {
            dialog: "✅ 非常好！這就是躲避球的最高榮譽！<br>誠實不僅是對對手的尊重，也是對這項運動的尊重。永遠記住：**誠實制 (Honor System)** 是這項運動的基石。<br><br>你已經具備正確的心態，準備好進入實戰演練了！",
            choices: [{ text: "返回首頁選擇下一關", action: () => { dialogBox.classList.remove('show'); setTimeout(() => { titleScreen.style.display = 'flex'; }, 300); } }]
        },

        // ==========================================
        // 第一關：開局與基礎攻防 (6v6)
        // ==========================================
        intro: {
            setup: () => {
                teamBlue = []; teamRed = []; balls = [];
                let spacing = courtDrawW / 7;
                
                for(let i=0; i<6; i++) {
                    let px = courtDrawX + spacing * (i+1);
                    let py = courtDrawY + courtDrawH - 25;
                    let isUser = (i === 4); 
                    let char = { x: px, y: py, color: isUser ? '#3B82F6' : '#60A5FA', hasBall: false, ballCount: 0, isOut: false, team: 'blue', isUser: isUser, name: isUser ? '你' : '' };
                    teamBlue.push(char);
                    if(isUser) pObj = char; 
                    if(i === 2) tObj = char;

        },
        fail_l4_s4: {
            dialog: "❌ 搞錯啦！<br>記住最高指導原則：**先看人，再看球**！<br>左邊的隊友是第 1 個人，而你是從左邊數過來的第 2 個人。所以當戰術喊「2」時，是由身為第 2 個人的你，出手攻擊！",
            choices: [{ text: "重新嘗試", action: () => { dialogBox.classList.remove('show'); setTimeout(() => { loadScenario('level4_s4_intro'); }, 300); } }]
        },
        level4_end: {
            dialog: "🎉 恭喜通關第四關！<br>你學會了最核心的戰術暗號邏輯：<br>1. **先看人，再看球**：永遠先以「從左至右的人」為基準。<br>2. 空手者跳過不數。<br>3. 一人多球時，依然只佔一個順位。<br><br>這能讓團隊的集火攻擊無懈可擊！",
            choices: [
                { text: "回到首頁", action: () => { dialogBox.classList.remove('show'); setTimeout(() => { titleScreen.style.display = 'flex'; }, 300); } }
            ]
        }
    };

    function showDialog(text, hasNextBtn = false) {
        dialogText.innerHTML = text;
        choicesContainer.classList.add('hidden');
        choicesContainer.style.display = 'none'; 
        nextBtn.style.display = hasNextBtn ? 'block' : 'none';
        
        dialogBox.classList.remove('shrunk');
        setTimeout(() => { dialogBox.classList.add('show'); }, 50);
    }

    function showChoices(choices) {
        choicesContainer.innerHTML = '';
        choices.forEach((choice, index) => {
            let btn = document.createElement('button');
            btn.className = `choice-btn`;
            btn.innerHTML = `<span class="number">${index + 1}</span><span>${choice.text}</span>`;
            btn.onclick = () => choice.action(btn);
            choicesContainer.appendChild(btn);
        });
        choicesContainer.classList.remove('hidden');
        choicesContainer.style.display = 'flex';
        nextBtn.style.display = 'none';
        
        dialogBox.classList.remove('shrunk');
    }

    function loadScenario(scenarioId) {
        currentScenarioNode = scenarios[scenarioId];
        if (currentScenarioNode.setup) currentScenarioNode.setup();
        if (currentScenarioNode.choices) {
            dialogText.innerHTML = currentScenarioNode.dialog;
            showChoices(currentScenarioNode.choices);
            dialogBox.classList.add('show');
        } else if (currentScenarioNode.action) {
            showDialog(currentScenarioNode.dialog, true);
            nextBtn.onclick = () => {
                dialogBox.classList.remove('show');
                setTimeout(() => { currentScenarioNode.action(); }, 300); 
            };
        }
    }

    window.startGame = function(scenarioId) {
        titleScreen.style.display = 'none';
        resizeCanvas(); 
        loadScenario(scenarioId);
    };

</script>
</body>
</html>
