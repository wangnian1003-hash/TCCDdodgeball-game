<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <title>台中美式躲避球協會-新手入門攻略</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #111827; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            touch-action: none; 
        }
        #game-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background-color: #1a202c; 
        }
        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
        }
        
        /* 對話框 UI */
        #dialog-layer { 
            position: absolute; 
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;     
            pointer-events: none; 
            padding: 15px; 
            z-index: 10; 
        }
        .dialog-box { 
            background: rgba(17, 24, 39, 0.95); 
            border: 2px solid #FBBF24; 
            border-radius: 12px; 
            padding: 16px 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.7); 
            pointer-events: auto; 
            transform: scale(0.8) translateY(20px); 
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            max-height: 85vh; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            transform-origin: center center; 
            width: 100%;
            max-width: 28rem;
        }
        .dialog-box.show { 
            transform: scale(1) translateY(0); 
            opacity: 1; 
        }
        .dialog-box.show.shrunk { 
            transform: translateY(35vh) scale(0.7); 
            opacity: 0.4; 
            pointer-events: none; 
            border-color: rgba(251, 191, 36, 0.3);
        }

        /* 縮小看場地狀態 */
        .dialog-box.minimized {
            transform: translateY(38vh) scale(0.9) !important;
            opacity: 0.85 !important;
            border-color: rgba(251, 191, 36, 0.6);
        }
        
        .choice-btn { 
            background: #374151; 
            border: 1px solid #4B5563; 
            color: white; 
            padding: 10px 14px; 
            border-radius: 8px; 
            margin-top: 8px; 
            width: 100%; 
            text-align: left; 
            transition: all 0.2s; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            font-size: 14px; 
        }
        .choice-btn:active { background: #4B5563; border-color: #FBBF24; transform: scale(0.98); }
        
        .choice-btn .number { 
            background: #FBBF24; 
            color: black; 
            font-weight: bold; 
            width: 22px; 
            height: 22px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-right: 10px; 
            flex-shrink: 0; 
            font-size: 13px; 
        }

        .coach-avatar { 
            width: 40px; 
            height: 40px; 
            background: #EF4444; 
            border-radius: 50%; 
            border: 2px solid white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 20px; 
            margin-right: 10px; 
            flex-shrink: 0; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        /* 關卡選單 3x2 網格排版 */
        .level-btn {
            background: rgba(37, 99, 235, 0.8);
            border: 2px solid #3B82F6;
            padding: 12px 10px;
            border-radius: 12px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 85px;
        }
        .level-btn:active { transform: scale(0.95); filter: brightness(1.2); }

    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="dialog-layer">
            <div id="dialog-box" class="dialog-box mx-auto w-full max-w-md">
                
                <div class="flex justify-between items-center border-b border-gray-600 pb-2 mb-2">
                    <h3 class="text-yellow-400 font-bold text-[14px] flex items-center">
                        <span class="mr-2 text-lg">👨‍🏫</span> 戰術教練
                    </h3>
                    <div class="flex gap-2">
                        <button id="minimize-btn" class="text-[12px] bg-indigo-600 hover:bg-indigo-500 text-white px-2 py-1 rounded transition shadow border border-indigo-500 hidden">👁️ 看場地</button>
                        <button id="back-btn" class="text-[12px] bg-gray-700 hover:bg-gray-500 text-white px-2 py-1 rounded transition shadow border border-gray-500 hidden">⬅️ 上一步</button>
                        <button id="home-btn" class="text-[12px] bg-gray-700 hover:bg-gray-500 text-white px-2 py-1 rounded transition shadow border border-gray-500">🏠 首頁</button>
                    </div>
                </div>

                <div id="dialog-body">
                    <div class="flex items-start mb-1 relative">
                        <div class="flex-1 w-full">
                            <div id="dialog-text" class="text-gray-100 text-[14px] leading-[1.5]">歡迎來到美式躲避球戰術板！</div>
                        </div>
                    </div>
                    <div id="choices-container" class="mt-1 hidden flex-col"></div>
                    <button id="next-btn" class="mt-3 bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-2 px-6 rounded-full self-end ml-auto block shadow-lg text-[14px]">
                        繼續
                    </button>
                </div>

            </div>
        </div>

        <div id="title-screen" class="absolute inset-0 bg-gray-900/95 flex flex-col items-center justify-center pointer-events-auto z-50 p-4 sm:p-6 overflow-y-auto">
            
            <div class="relative flex justify-center items-center h-28 w-28 sm:h-36 sm:w-36 mb-3 mt-4">
                <div class="absolute text-5xl drop-shadow-md">🏐</div>
                <img src="TCCD.png" alt="台中美式躲避球協會 LOGO" class="absolute inset-0 w-full h-full object-contain bg-white p-2 rounded-2xl shadow-[0_0_20px_rgba(251,191,36,0.3)] z-10" onerror="this.style.display='none';">
            </div>
            
            <h1 class="text-3xl sm:text-5xl font-extrabold text-yellow-400 mb-1 text-center leading-tight drop-shadow-lg tracking-wide">
                台中美式躲避球協會
            </h1>
            <h2 class="text-xl sm:text-2xl text-white font-bold mb-6 mt-1 opacity-90">
                新手入門攻略
            </h2>
            
            <p class="text-gray-300 text-center mb-8 text-[14px] sm:text-[15px] leading-relaxed max-w-md">
                模擬真實賽場局勢，學習最純正的 WDBF 規則。<br>你需要根據戰術，做出正確的判斷！
            </p>
            
            <div class="w-full max-w-4xl grid grid-cols-2 md:grid-cols-3 gap-3 sm:gap-4 mt-2 px-2">
                <button class="level-btn bg-gray-700 border-gray-500 hover:bg-gray-600" onclick="window.startGame('court_intro')">
                    <span class="text-base sm:text-lg">前導篇</span>
                    <span class="text-[12px] sm:text-[13px] font-normal text-gray-300 mt-1">場地標線解密</span>
                </button>
                <button class="level-btn bg-gray-600 border-gray-400 hover:bg-gray-500" onclick="window.startGame('basic_abcd')">
                    <span class="text-base sm:text-lg">基礎篇</span>
                    <span class="text-[12px] sm:text-[13px] font-normal text-gray-300 mt-1">ABCD與誠實制</span>
                </button>
                <button class="level-btn bg-blue-600 border-blue-400 hover:bg-blue-500" onclick="window.startGame('intro')">
                    <span class="text-base sm:text-lg">第一關</span>
                    <span class="text-[12px] sm:text-[13px] font-normal text-blue-100 mt-1">開局與基礎攻防</span>
                </button>
                <button class="level-btn bg-purple-600 border-purple-400 hover:bg-purple-500" onclick="window.startGame('level2_intro')">
                    <span class="text-base sm:text-lg">第二關</span>
                    <span class="text-[12px] sm:text-[13px] font-normal text-purple-100 mt-1">進階觀念與危機</span>
                </button>
                <button class="level-btn bg-green-600 border-green-400 hover:bg-green-500" onclick="window.startGame('level3_intro')">
                    <span class="text-base sm:text-lg">第三關</span>
                    <span class="text-[12px] sm:text-[13px] font-normal text-green-100 mt-1">彈射球與救援</span>
                </button>
                <button class="level-btn bg-orange-600 border-orange-400 hover:bg-orange-500" onclick="window.startGame('level4_intro')">
                    <span class="text-base sm:text-lg">第四關</span>
                    <span class="text-[12px] sm:text-[13px] font-normal text-orange-100 mt-1">攻擊戰術與暗號</span>
                </button>
            </div>
        </div>
    </div>

<script>
    // --- 確保腳本正確啟動 ---
    console.log("=== 躲避球系統初始化開始 ===");

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI 元素
    const dialogBox = document.getElementById('dialog-box');
    const dialogBody = document.getElementById('dialog-body');
    const dialogText = document.getElementById('dialog-text');
    const choicesContainer = document.getElementById('choices-container');
    const nextBtn = document.getElementById('next-btn');
    const titleScreen = document.getElementById('title-screen');
    const backBtn = document.getElementById('back-btn');
    const homeBtn = document.getElementById('home-btn');
    const minimizeBtn = document.getElementById('minimize-btn');

    let COURT_WIDTH, COURT_HEIGHT, CENTER_Y, ATTACK_LINE_P1_Y, ATTACK_LINE_P2_Y; 
    let courtDrawX, courtDrawY, courtDrawW, courtDrawH;

    function resizeCanvas() {
        COURT_WIDTH = window.innerWidth;
        COURT_HEIGHT = window.innerHeight;
        canvas.width = COURT_WIDTH;
        canvas.height = COURT_HEIGHT;
        CENTER_Y = COURT_HEIGHT / 2;
        let marginX = COURT_WIDTH * 0.05;
        let marginY = COURT_HEIGHT * 0.08;
        courtDrawW = COURT_WIDTH - marginX * 2;
        if(courtDrawW > 500) { courtDrawW = 500; marginX = (COURT_WIDTH - 500) / 2; }
        courtDrawH = COURT_HEIGHT - marginY * 2;
        courtDrawX = marginX; courtDrawY = marginY;
        let halfCourtH = courtDrawH / 2;
        ATTACK_LINE_P1_Y = CENTER_Y + halfCourtH * 0.33; 
        ATTACK_LINE_P2_Y = CENTER_Y - halfCourtH * 0.33; 
        drawScene();
    }
    window.addEventListener('resize', resizeCanvas);

    let isAnimating = false, currentAnimation = null, animationTimer = 0;
    let teamBlue = [], teamRed = [], balls = []; 
    let pObj = null, eObj = null, tObj = null, outTeammate = null; 
    let currentScenarioNode = null, loopRunning = false, highlightMode = null; 
    let historyStack = [], currentScenarioId = null;
    let isMinimized = false;

    resizeCanvas();

    // --- 縮小看場地功能 ---
    minimizeBtn.addEventListener('click', () => {
        isMinimized = !isMinimized;
        if (isMinimized) {
            dialogBody.style.display = 'none';
            dialogBox.classList.add('minimized');
            minimizeBtn.innerHTML = '💬 回答問題';
            minimizeBtn.classList.replace('bg-indigo-600', 'bg-yellow-500');
            minimizeBtn.classList.replace('border-indigo-500', 'border-yellow-400');
            minimizeBtn.classList.replace('hover:bg-indigo-500', 'hover:bg-yellow-400');
            minimizeBtn.classList.replace('text-white', 'text-black');
            minimizeBtn.classList.add('font-bold');
        } else {
            dialogBody.style.display = 'block';
            dialogBox.classList.remove('minimized');
            minimizeBtn.innerHTML = '👁️ 看場地';
            minimizeBtn.classList.replace('bg-yellow-500', 'bg-indigo-600');
            minimizeBtn.classList.replace('border-yellow-400', 'border-indigo-500');
            minimizeBtn.classList.replace('hover:bg-yellow-400', 'hover:bg-indigo-500');
            minimizeBtn.classList.replace('text-black', 'text-white');
            minimizeBtn.classList.remove('font-bold');
        }
    });

    backBtn.addEventListener('click', () => {
        if (historyStack.length > 0) {
            let prevScenario = historyStack.pop();
            dialogBox.classList.remove('show');
            setTimeout(() => { loadScenario(prevScenario, true); }, 300);
        }
    });

    homeBtn.addEventListener('click', () => {
        dialogBox.classList.remove('show');
        setTimeout(() => {
            titleScreen.style.display = 'flex';
            balls.forEach(b => b.thrown = false);
            isAnimating = false;
            highlightMode = null;
        }, 300);
    });

    function drawScene() {
        ctx.fillStyle = '#111827';
        ctx.fillRect(0, 0, COURT_WIDTH, COURT_HEIGHT);
        ctx.fillStyle = '#db9c6e'; 
        ctx.fillRect(courtDrawX, courtDrawY, courtDrawW, courtDrawH);
        ctx.lineWidth = 4; ctx.strokeStyle = '#FFFFFF'; ctx.strokeRect(courtDrawX, courtDrawY, courtDrawW, courtDrawH);
        ctx.beginPath(); ctx.moveTo(courtDrawX, CENTER_Y); ctx.lineTo(courtDrawX + courtDrawW, CENTER_Y); ctx.lineWidth = 6; ctx.stroke();
        ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(courtDrawX, ATTACK_LINE_P2_Y); ctx.lineTo(courtDrawX + courtDrawW, ATTACK_LINE_P2_Y); ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)'; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(courtDrawX, ATTACK_LINE_P1_Y); ctx.lineTo(courtDrawX + courtDrawW, ATTACK_LINE_P1_Y); ctx.stroke();

        ctx.fillStyle = 'rgba(239, 68, 68, 0.1)'; ctx.fillRect(courtDrawX, courtDrawY, courtDrawW, courtDrawH / 2);
        ctx.fillStyle = 'rgba(59, 130, 246, 0.1)'; ctx.fillRect(courtDrawX, CENTER_Y, courtDrawW, courtDrawH / 2);

        if (highlightMode) {
            let pulseAlpha = (Math.sin(Date.now() / 150) + 1) / 2 * 0.6 + 0.2;
            if (highlightMode === 'boundary') {
                ctx.lineWidth = 8; ctx.strokeStyle = `rgba(239, 68, 68, ${pulseAlpha})`; ctx.strokeRect(courtDrawX, courtDrawY, courtDrawW, courtDrawH);
            } else if (highlightMode === 'center') {
                ctx.lineWidth = 10; ctx.strokeStyle = `rgba(251, 191, 36, ${pulseAlpha})`; ctx.beginPath(); ctx.moveTo(courtDrawX, CENTER_Y); ctx.lineTo(courtDrawX + courtDrawW, CENTER_Y); ctx.stroke();
            } else if (highlightMode === 'attack') {
                ctx.lineWidth = 8; ctx.strokeStyle = `rgba(59, 130, 246, ${pulseAlpha})`; ctx.beginPath(); ctx.moveTo(courtDrawX, ATTACK_LINE_P1_Y); ctx.lineTo(courtDrawX + courtDrawW, ATTACK_LINE_P1_Y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(courtDrawX, ATTACK_LINE_P2_Y); ctx.lineTo(courtDrawX + courtDrawW, ATTACK_LINE_P2_Y); ctx.stroke();
            }
        }

        balls.forEach(b => { if (!b.isHeld && !b.thrown && !b.hidden) drawBall(b.x, b.y); });
        balls.forEach(b => { if (b.thrown) drawBall(b.x, b.y, true); });
        teamRed.forEach(char => { drawCharacter(char); });
        teamBlue.forEach(char => { drawCharacter(char); });
    }

    function drawCharacter(char) {
        ctx.save();
        if (char.isOut) {
            ctx.globalAlpha = 0.3;
            if (char.team === 'blue') ctx.translate(courtDrawX - 20, courtDrawY + courtDrawH - 40);
            else ctx.translate(courtDrawX + courtDrawW + 20, courtDrawY + 40);
        } else { ctx.translate(char.x, char.y); }
        ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fillStyle = char.color; ctx.fill();
        ctx.lineWidth = char.isUser ? 3 : 2; ctx.strokeStyle = char.isUser ? '#FBBF24' : '#FFF'; ctx.stroke();
        if (char.hasBall) {
            ctx.beginPath(); let ballOffsetX = 12; let ballOffsetY = char.team === 'red' ? 10 : -10; 
            ctx.arc(ballOffsetX, ballOffsetY, 7, 0, Math.PI*2); ctx.fillStyle = '#F97316'; ctx.fill(); ctx.stroke();
            if (char.ballCount > 1) { ctx.beginPath(); ctx.arc(-ballOffsetX, ballOffsetY, 7, 0, Math.PI*2); ctx.fillStyle = '#F97316'; ctx.fill(); ctx.stroke(); }
        }
        ctx.fillStyle = 'white';
        if (char.team === 'red') { ctx.beginPath(); ctx.arc(-5, 6, 2.5, 0, Math.PI*2); ctx.arc(5, 6, 2.5, 0, Math.PI*2); ctx.fill(); }
        else { ctx.beginPath(); ctx.arc(-5, -6, 2.5, 0, Math.PI*2); ctx.arc(5, -6, 2.5, 0, Math.PI*2); ctx.fill(); }
        ctx.restore();
        if (char.name && !char.isOut) {
            ctx.fillStyle = char.isUser ? '#FBBF24' : '#FFF'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
            let textY = char.team === 'red' ? char.y - 22 : char.y + 26; ctx.fillText(char.name, char.x, textY);
        }
    }

    function drawBall(x, y, isFlying = false) {
        ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2); ctx.fillStyle = '#F97316'; ctx.fill(); ctx.lineWidth = 1; ctx.strokeStyle = '#000'; ctx.stroke();
        if (isFlying) { ctx.beginPath(); ctx.arc(x, y, 9, 0, Math.PI*2); ctx.fillStyle = 'rgba(249, 115, 22, 0.3)'; ctx.fill(); }
    }

    function easeInOutQuad(t) { return t<.5 ? 2*t*t : -1+(4-2*t)*t; }

    function animateLoop() {
        let stillAnimating = false;
        
        if (isAnimating && currentAnimation) {
            animationTimer += 0.5; 
            let progress = currentAnimation.duration > 0 ? animationTimer / currentAnimation.duration : 1;
            if (progress > 1) progress = 1;
            
            let easedProgress = easeInOutQuad(progress);
            if (currentAnimation.onFrame) currentAnimation.onFrame(easedProgress);
            
            if (progress === 1) { 
                isAnimating = false; 
                if (currentAnimation.onComplete) {
                    currentAnimation.onComplete(); 
                }
            } else { 
                stillAnimating = true; 
            }
        }
        
        let ballsFlying = balls.some(b => b.thrown);
        if (ballsFlying) {
            balls.forEach(b => {
                if (b.thrown) {
                    b.x += b.vx * 0.5; b.y += b.vy * 0.5;
                    let hitTarget = null; let allChars = [...teamBlue, ...teamRed];
                    for (let char of allChars) { 
                        if (!char.isOut && char !== b.thrower && Math.hypot(char.x - b.x, char.y - b.y) < 20) { hitTarget = char; break; } 
                    }
                    
                    if (hitTarget) { 
                        b.thrown = false; 
                        if (currentAnimation && currentAnimation.onHit) {
                            currentAnimation.onHit(hitTarget); 
                        }
                    } else if (b.y > courtDrawY + courtDrawH || b.y < courtDrawY || b.x < courtDrawX || b.x > courtDrawX + courtDrawW) { 
                        b.thrown = false; 
                        if (currentAnimation && currentAnimation.onMiss) currentAnimation.onMiss();
                    }
                }
            });
        }
        
        drawScene();
        
        if (stillAnimating || ballsFlying || highlightMode) { 
            loopRunning = true; requestAnimationFrame(animateLoop); 
        } else { 
            loopRunning = false; 
        }
    }

    function playAnimation(animDef) { 
        currentAnimation = animDef; 
        animationTimer = 0; 
        isAnimating = true; 
        if (!loopRunning) { loopRunning = true; requestAnimationFrame(animateLoop); } 
    }

    // ==========================================
    // 劇本庫
    // ==========================================
    const scenarios = {
        // --- 前導篇 ---
        court_intro: {
            setup: () => { teamBlue = []; teamRed = []; balls = []; highlightMode = null; let midX = courtDrawX + courtDrawW / 2; pObj = { x: midX, y: courtDrawY + courtDrawH - 50, color: '#3B82F6', hasBall: false, isOut: false, team: 'blue', isUser: true, name: '你' }; teamBlue.push(pObj); eObj = { x: midX, y: courtDrawY + 50, color: '#EF4444', hasBall: false, isOut: false, team: 'red', isUser: false, name: '對手' }; teamRed.push(eObj); drawScene(); },
            dialog: "【前導：場地與尺寸解密】<br>上場前，先來認識國際標準 (WDBF) 的場地規格！<br><svg viewBox='0 0 200 110' xmlns='http://www.w3.org/2000/svg' class='w-full max-w-[220px] mx-auto my-3 border-2 border-gray-500 rounded bg-[#db9c6e] p-1 shadow-inner'><rect x='10' y='10' width='90' height='90' fill='rgba(59, 130, 246, 0.1)' stroke='none'/><rect x='100' y='10' width='90' height='90' fill='rgba(239, 68, 68, 0.1)' stroke='none'/><rect x='10' y='10' width='180' height='90' fill='none' stroke='#fff' stroke-width='2'/><line x1='100' y1='10' x2='100' y2='100' stroke='#fff' stroke-width='3'/><line x1='70' y1='10' x2='70' y2='100' stroke='#fff' stroke-dasharray='4 3' stroke-width='1.5'/><line x1='130' y1='10' x2='130' y2='100' stroke='#fff' stroke-dasharray='4 3' stroke-width='1.5'/><line x1='25' y1='10' x2='25' y2='100' stroke='rgba(255,255,255,0.8)' stroke-dasharray='2 2' stroke-width='1.5'/><line x1='175' y1='10' x2='175' y2='100' stroke='rgba(255,255,255,0.8)' stroke-dasharray='2 2' stroke-width='1.5'/><text x='100' y='60' fill='white' font-size='11' font-weight='bold' text-anchor='middle' font-family='sans-serif'>中線</text><text x='70' y='60' fill='rgba(255,255,255,0.9)' font-size='8' text-anchor='middle' font-family='sans-serif'>3米線</text><text x='130' y='60' fill='rgba(255,255,255,0.9)' font-size='8' text-anchor='middle' font-family='sans-serif'>3米線</text><text x='25' y='85' fill='rgba(255,255,255,0.9)' font-size='6.5' text-anchor='middle' font-family='sans-serif'>女子底線</text><text x='175' y='85' fill='rgba(255,255,255,0.9)' font-size='6.5' text-anchor='middle' font-family='sans-serif'>女子底線</text></svg>📏 **場地尺寸 (依性別不同)**<br>• **男子組 / 混合組**：9公尺 × 18公尺 (同排球場)<br>• **女子組**：9公尺 × 15公尺 (兩側底線內縮 7.5 米)",
            action: () => { loadScenario('court_intro_center'); }
        },
        court_intro_center: {
            setup: () => { highlightMode = 'center'; if (!loopRunning) { loopRunning = true; requestAnimationFrame(animateLoop); } },
            dialog: "📍 **1. 中線 (Center Line)**<br><svg viewBox='0 0 200 110' xmlns='http://www.w3.org/2000/svg' class='w-full max-w-[220px] mx-auto my-2 border-2 border-gray-500 rounded bg-[#db9c6e] p-1 shadow-inner'><rect x='10' y='10' width='90' height='90' fill='rgba(59, 130, 246, 0.1)' stroke='none'/><rect x='100' y='10' width='90' height='90' fill='rgba(239, 68, 68, 0.1)' stroke='none'/><rect x='10' y='10' width='180' height='90' fill='none' stroke='#fff' stroke-width='2'/><line x1='100' y1='10' x2='100' y2='100' stroke='#FBBF24' stroke-width='4'/><line x1='70' y1='10' x2='70' y2='100' stroke='#fff' stroke-dasharray='4 3' stroke-width='1.5'/><line x1='130' y1='10' x2='130' y2='100' stroke='#fff' stroke-dasharray='4 3' stroke-width='1.5'/><line x1='25' y1='10' x2='25' y2='100' stroke='rgba(255,255,255,0.8)' stroke-dasharray='2 2' stroke-width='1.5'/><line x1='175' y1='10' x2='175' y2='100' stroke='rgba(255,255,255,0.8)' stroke-dasharray='2 2' stroke-width='1.5'/><text x='100' y='60' fill='#FBBF24' font-size='12' font-weight='bold' text-anchor='middle' font-family='sans-serif'>中線</text><text x='70' y='60' fill='rgba(255,255,255,0.9)' font-size='8' text-anchor='middle' font-family='sans-serif'>3米線</text><text x='130' y='60' fill='rgba(255,255,255,0.9)' font-size='8' text-anchor='middle' font-family='sans-serif'>3米線</text><text x='25' y='85' fill='rgba(255,255,255,0.9)' font-size='6.5' text-anchor='middle' font-family='sans-serif'>女子底線</text><text x='175' y='85' fill='rgba(255,255,255,0.9)' font-size='6.5' text-anchor='middle' font-family='sans-serif'>女子底線</text></svg>這是一條絕對不可侵犯的楚河漢界！<br>看看上方圖示中**亮起黃光**的這條線：無論攻擊還是閃躲，雙方球員的腳**絕對不可踩踏或越過**中線，否則立刻出局！",
            action: () => { loadScenario('court_intro_attack'); }
        },
        court_intro_attack: {
            setup: () => { highlightMode = 'attack'; if (!loopRunning) { loopRunning = true; requestAnimationFrame(animateLoop); } },
            dialog: "📍 **2. 3米啟動線 (Attack Line)**<br><svg viewBox='0 0 200 110' xmlns='http://www.w3.org/2000/svg' class='w-full max-w-[220px] mx-auto my-2 border-2 border-gray-500 rounded bg-[#db9c6e] p-1 shadow-inner'><rect x='10' y='10' width='90' height='90' fill='rgba(59, 130, 246, 0.1)' stroke='none'/><rect x='100' y='10' width='90' height='90' fill='rgba(239, 68, 68, 0.1)' stroke='none'/><rect x='10' y='10' width='180' height='90' fill='none' stroke='#fff' stroke-width='2'/><line x1='100' y1='10' x2='100' y2='100' stroke='#fff' stroke-width='3'/><line x1='70' y1='10' x2='70' y2='100' stroke='#60A5FA' stroke-dasharray='4 3' stroke-width='3'/><line x1='130' y1='10' x2='130' y2='100' stroke='#60A5FA' stroke-dasharray='4 3' stroke-width='3'/><line x1='25' y1='10' x2='25' y2='100' stroke='rgba(255,255,255,0.8)' stroke-dasharray='2 2' stroke-width='1.5'/><line x1='175' y1='10' x2='175' y2='100' stroke='rgba(255,255,255,0.8)' stroke-dasharray='2 2' stroke-width='1.5'/><text x='100' y='60' fill='white' font-size='11' font-weight='bold' text-anchor='middle' font-family='sans-serif'>中線</text><text x='70' y='60' fill='#60A5FA' font-size='9' font-weight='bold' text-anchor='middle' font-family='sans-serif'>3米線</text><text x='130' y='60' fill='#60A5FA' font-size='9' font-weight='bold' text-anchor='middle' font-family='sans-serif'>3米線</text><text x='25' y='85' fill='rgba(255,255,255,0.9)' font-size='6.5' text-anchor='middle' font-family='sans-serif'>女子底線</text><text x='175' y='85' fill='rgba(255,255,255,0.9)' font-size='6.5' text-anchor='middle' font-family='sans-serif'>女子底線</text></svg>控制比賽節奏的關鍵。<br>開局搶到球時，球處於「未啟動」狀態。球員必須帶著球退回或傳回圖示中**亮起藍光**的這條虛線後方，球才會「啟動」並具備攻擊效力！",
            action: () => { loadScenario('court_intro_boundary'); }
        },
        court_intro_boundary: {
            setup: () => { highlightMode = 'boundary'; if (!loopRunning) { loopRunning = true; requestAnimationFrame(animateLoop); } },
            dialog: "📍 **3. 邊界 (Boundary)**<br><svg viewBox='0 0 200 110' xmlns='http://www.w3.org/2000/svg' class='w-full max-w-[220px] mx-auto my-2 border-2 border-gray-500 rounded bg-[#db9c6e] p-1 shadow-inner'><rect x='10' y='10' width='90' height='90' fill='rgba(59, 130, 246, 0.1)' stroke='none'/><rect x='100' y='10' width='90' height='90' fill='rgba(239, 68, 68, 0.1)' stroke='none'/><rect x='10' y='10' width='180' height='90' fill='none' stroke='#EF4444' stroke-width='4'/><line x1='100' y1='10' x2='100' y2='100' stroke='#fff' stroke-width='3'/><line x1='70' y1='10' x2='70' y2='100' stroke='#fff' stroke-dasharray='4 3' stroke-width='1.5'/><line x1='130' y1='10' x2='130' y2='100' stroke='#fff' stroke-dasharray='4 3' stroke-width='1.5'/><line x1='25' y1='10' x2='25' y2='100' stroke='#EF4444' stroke-dasharray='4 3' stroke-width='2.5'/><line x1='175' y1='10' x2='175' y2='100' stroke='#EF4444' stroke-dasharray='4 3' stroke-width='2.5'/><text x='100' y='60' fill='white' font-size='11' font-weight='bold' text-anchor='middle' font-family='sans-serif'>中線</text><text x='70' y='60' fill='rgba(255,255,255,0.9)' font-size='8' text-anchor='middle' font-family='sans-serif'>3米線</text><text x='130' y='60' fill='rgba(255,255,255,0.9)' font-size='8' text-anchor='middle' font-family='sans-serif'>3米線</text><text x='25' y='85' fill='#EF4444' font-size='7' font-weight='bold' text-anchor='middle' font-family='sans-serif'>女子底線</text><text x='175' y='85' fill='#EF4444' font-size='7' font-weight='bold' text-anchor='middle' font-family='sans-serif'>女子底線</text></svg>場地最外圍的警戒框線。<br>比賽進行中，如果你為了閃躲對手，而不小心**踩到圖示中的紅光邊界線（包含男女各組底線）**，哪怕只碰到一點點，也會被直接判出局！",
            choices: [{ text: "我完全了解了！回到首頁", action: () => { highlightMode = null; dialogBox.classList.remove('show'); setTimeout(() => { titleScreen.style.display = 'flex'; }, 300); } }]
        },

        // --- 基礎篇 ---
        basic_abcd: {
            setup: () => { teamBlue = []; teamRed = []; balls = []; let midX = courtDrawX + courtDrawW/2; pObj = { x: midX, y: courtDrawY + courtDrawH - 50, color: '#3B82F6', hasBall: false, isOut: false, team: 'blue', isUser: true, name: '你' }; teamBlue.push(pObj); eObj = { x: midX, y: courtDrawY + 50, color: '#EF4444', hasBall: true, ballCount: 1, isOut: false, team: 'red', isUser: false, name: '對手' }; teamRed.push(eObj); balls.push({x: eObj.x, y: eObj.y, isHeld: true, thrown: false, vx:0, vy:0, id: 0, thrower: eObj}); drawScene(); },
            dialog: "【基礎篇：ABCD 四大核心】<br>上場前，你必須先牢記美式躲避球的四大核心技巧：<br><br>🎯 **A**ttack (攻擊)<br>🛡️ **B**lock (擋擊)<br>🤲 **C**atch (接殺)<br>💨 **D**odge (閃避)<br><br>接下來，我們將為你一一詳細介紹！",
            action: () => { loadScenario('basic_a'); }
        },
        basic_a: { dialog: "🎯 **Attack (攻擊)**<br><br>不僅僅是把球用力丟向對手！<br>在進階比賽中，最核心的攻擊觀念是配合隊友進行**「同步集火 (Team Throw)」**。<br>也就是場上多人同時丟出多顆球，形成交叉火網，讓對手防不勝防！", action: () => { loadScenario('basic_b'); } },
        basic_b: { dialog: "🛡️ **Block (擋擊)**<br><br>手上的球就是你最強的實體盾牌！<br>面對攻擊時，你可以用雙手緊緊握住自己的球，去**彈開**飛來的攻擊。<br>切記：只要用來擋的球**沒有被打落**，你就是絕對安全的！", action: () => { loadScenario('basic_c'); } },
        basic_c: { dialog: "🤲 **Catch (接殺)**<br><br>這是瞬間逆轉戰局的終極武器！<br>只要在對手的球落地前，徒手將其接穩，就會觸發超強效果：<br>1. **丟球的對手立刻出局**<br>2. **立刻復活一名場外的隊友**<br>雖然風險高，但回報極大！", action: () => { loadScenario('basic_d'); } },
        basic_d: { dialog: "💨 **Dodge (閃避)**<br><br>生存的最高指導原則！<br>透過下蹲、側身、後退或跳躍來靈活閃開攻擊。<br>不要貪圖接殺每一顆飛來的球，請記住：**活在場上，才能為團隊創造更多機會**！", action: () => { loadScenario('basic_outs'); } },
        basic_outs: { dialog: "【基礎篇：四大出局條件】<br>了解怎麼贏之前，必須先知道怎麼會輸！<br>在場上，如果發生以下 **4 種情況**，就會被裁判判定出局 (Out) 喔：<br><br>1️⃣ **被擊中** ｜ 2️⃣ **被接殺** ｜ 3️⃣ **踩線** ｜ 4️⃣ **掉球**<br><br>讓我們來詳細看看這些出局陷阱！", action: () => { loadScenario('basic_out_1'); } },
        basic_out_1: { dialog: "1️⃣ **被擊中 (Hit)**<br><br>最常見的出局方式。<br>只要你的**身體任何部位、頭髮、或是穿戴的衣物**，被對手丟出的「活球」直接砸中，你就出局了。<br>千萬別以為衣服擦到不算，美式躲避球可是非常嚴格的！", action: () => { loadScenario('basic_out_2'); } },
        basic_out_2: { dialog: "2️⃣ **被接殺 (Caught)**<br><br>攻擊時最大的風險！<br>如果你丟出去的球，在還沒碰到地板或牆壁前，**被對手徒手接穩了**，那麼丟球的你就會立刻出局。<br>不僅如此，對手還能因此**復活一名隊友**，這會造成巨大的戰局逆轉！", action: () => { loadScenario('basic_out_3'); } },
        basic_out_3: { dialog: "3️⃣ **踩線 (Out of Bounds)**<br><br>新手最容易犯的錯誤！<br>躲避球場有嚴格的界線。在閃躲或攻擊時，只要你的腳**踩到或越過白色的邊線、底線或中線**，哪怕只有踩到一點點白線，都會被立刻判出局。<br>在場上必須隨時注意自己的腳步！", action: () => { loadScenario('basic_out_4'); } },
        basic_out_4: { dialog: "4️⃣ **掉球 (Disarm)**<br><br>擋球失敗的代價。<br>我們前面學過可以用手上的球去擋攻擊 (Block)。但如果對手的球太猛，導致你**用來擋的球不小心被打落掉到地上** (俗稱奶油手)，你就會被判定出局！<br>所以把球當盾牌時，請務必抓緊！", action: () => { loadScenario('basic_intro'); } },
        basic_intro: {
            dialog: "【基礎篇：誠實制】<br>除了 ABCD 技巧，這項運動真正的靈魂是：**「誠實 (Honor System)」**。<br><br>現在對手朝你丟了一顆球...",
            action: () => {
                dialogBox.classList.add('shrunk'); eObj.hasBall = false; balls[0].isHeld = false; balls[0].thrown = true; balls[0].thrower = eObj;
                let angle = Math.atan2(pObj.y - eObj.y, pObj.x - eObj.x); 
                balls[0].vx = Math.cos(angle)*10; balls[0].vy = Math.sin(angle)*10;
                playAnimation({ 
                    duration: 35, 
                    onHit: () => { balls[0].thrown = false; balls[0].x = pObj.x+15; balls[0].y = pObj.y+15; },
                    onComplete: () => { loadScenario('basic_decision'); } 
                });
            }
        },
        basic_decision: {
            dialog: "【暫停】<br>球輕輕擦過了你的衣服邊緣，然後掉在地上。裁判的視線剛好被擋住，**他沒有看到你被擊中**。<br>你要怎麼做？",
            choices: [
                { text: "假裝沒事，繼續留在場上比賽", action: () => { loadScenario('fail_honesty'); } },
                { text: "主動舉手大喊「Out!」，並走向場外", action: () => { pObj.isOut = true; drawScene(); loadScenario('success_honesty'); } }
            ]
        },
        fail_honesty: { dialog: "❌ 絕對不行！<br>美式躲避球是一項紳士運動，極度仰賴球員的**「誠實 (Honor)」**。<br>只要被球擊中（包含衣服、頭髮），哪怕裁判沒看到，也必須主動承認！這嚴重違反了躲避球的精神！", choices: [{ text: "重新選擇", action: () => loadScenario('basic_intro') }] },
        success_honesty: { dialog: "✅ 非常好！這就是躲避球的最高榮譽！<br>誠實不僅是對對手的尊重，也是對這項運動的尊重。永遠記住：**誠實制 (Honor System)** 是這項運動的基石。<br><br>你已經具備正確的心態，準備好進入實戰演練了！", choices: [{ text: "回到首頁", action: () => { titleScreen.style.display = 'flex'; } }] },

        // --- 第一關 ---
        intro: {
            setup: () => {
                teamBlue = []; teamRed = []; balls = []; let spacing = courtDrawW / 7;
                for(let i=0; i<6; i++) {
                    let char = { x: courtDrawX + spacing*(i+1), y: courtDrawY + courtDrawH - 25, color: i===4?'#3B82F6':'#60A5FA', hasBall: false, ballCount: 0, isOut: false, team: 'blue', isUser: i===4, name: i===4?'你':'' };
                    teamBlue.push(char); if(i===4) pObj = char; if(i===2) tObj = char;
                }
                for(let i=0; i<6; i++) {
                    let char = { x: courtDrawX + spacing*(i+1), y: courtDrawY + 25, color: i===1?'#EF4444':'#F87171', hasBall: false, ballCount: 0, isOut: false, team: 'red', isUser: false, name: '' };
                    teamRed.push(char); if(i===1) eObj = char;
                }
                let bXs = [0.15, 0.25, 0.42, 0.58, 0.75, 0.85]; bXs.forEach((bx, i) => balls.push({x: courtDrawX+courtDrawW*bx, y: CENTER_Y, isHeld: false}));
                drawScene();
            },
            dialog: "【第一關：開局搶球】<br>雙方 6 名球員已就位，目前全員存活。<br><br>哨音響起，雙方各派 2 名跑球員衝刺搶球！",
            action: () => {
                dialogBox.classList.add('shrunk');
                let rB = [teamBlue[4], teamBlue[5]], rR = [teamRed[0], teamRed[1]];
                playAnimation({
                    duration: 45, onFrame: (p) => { 
                        rB.forEach(c => c.y = (courtDrawY + courtDrawH - 25) + (CENTER_Y + 20 - (courtDrawY + courtDrawH - 25)) * p);
                        rR.forEach(c => c.y = (courtDrawY + 25) + (CENTER_Y - 20 - (courtDrawY + 25)) * p);
                    },
                    onComplete: () => { 
                        rB[0].hasBall = true; rB[0].ballCount = 1; rB[1].hasBall = true; rB[1].ballCount = 1;
                        rR[0].hasBall = true; rR[0].ballCount = 1; rR[1].hasBall = true; rR[1].ballCount = 1;
                        loadScenario('decision_1'); 
                    }
                });
            }
        },
        decision_1: {
            dialog: "【暫停】<br>你成功搶到了球！<br>根據規則，開局搶到的球**必須先「退回或傳回 3米啟動線後 (Clear)」**。<br>你打算怎麼做？",
            choices: [
                { 
                    text: "立刻朝對手丟過去！", 
                    action: () => { 
                        pObj.hasBall = false; balls[4].thrown = true; balls[4].x = pObj.x; balls[4].y = pObj.y; balls[4].vx = 0; 
                        balls[4].vy = -10;
                        playAnimation({ duration: 40, onHit: (t) => { t.isOut = true; }, onComplete: () => { balls[4].thrown = false; loadScenario('fail_direct_attack'); } }); 
                    } 
                },
                { 
                    text: "帶著球退回「啟動線」後", 
                    action: () => { 
                        let startY = pObj.y; 
                        playAnimation({ duration: 35, onFrame: (p) => pObj.y = startY + (ATTACK_LINE_P1_Y + 20 - startY) * p, onComplete: () => loadScenario('success_retreat') }); 
                    } 
                },
                {
                    text: "往後傳給站在 3 米線的隊友",
                    action: () => {
                        pObj.hasBall = false; balls[4].thrown = true; balls[4].x = pObj.x; balls[4].y = pObj.y;
                        let angle = Math.atan2(tObj.y - pObj.y, tObj.x - pObj.x); 
                        balls[4].vx = Math.cos(angle) * 9; balls[4].vy = Math.sin(angle) * 9;
                        playAnimation({ 
                            duration: 35, 
                            onHit: (t) => { if(t === tObj) { t.hasBall = true; balls[4].thrown = false; balls[4].isHeld = true; balls[4].holder = t; } },
                            onComplete: () => { loadScenario('success_pass'); } 
                        });
                    }
                }
            ]
        },
        fail_direct_attack: { dialog: "❌ 犯規警告！<br>因為你沒有退回 3米啟動線，球還沒「啟動」。未啟動的球砸中人無效！", choices: [{ text: "重新嘗試", action: () => loadScenario('intro') }] },
        success_retreat: { 
            dialog: "✅ 正確！<br>你退回啟動線後了，球已「啟動」。<br><br>這時，剛好也退回線後的對手，突然朝你丟了一顆球過來！", 
            setup: () => { eObj.hasBall = false; balls[1].thrown = false; balls[1].x = eObj.x; balls[1].y = eObj.y; let angle = Math.atan2(pObj.y - eObj.y, pObj.x - eObj.x); balls[1].vx = Math.cos(angle)*10; balls[1].vy = Math.sin(angle)*10; },
            action: () => { balls[1].thrown = true; playAnimation({ duration: 15, onComplete: () => { balls[1].origVx = balls[1].vx; balls[1].origVy = balls[1].vy; balls[1].vx = 0; balls[1].vy = 0; balls[1].thrown = false; loadScenario('decision_defense'); } }); }
        },
        success_pass: {
            dialog: "✅ 絕佳配合！<br>傳過啟動線的球也會立刻「啟動」！<br><br>此時對手剛退回線後，見你在前線，便朝你丟了一顆球！",
            setup: () => { eObj.hasBall = false; balls[1].thrown = false; balls[1].x = eObj.x; balls[1].y = eObj.y; let angle = Math.atan2(pObj.y - eObj.y, pObj.x - eObj.x); balls[1].vx = Math.cos(angle)*10; balls[1].vy = Math.sin(angle)*10; },
            action: () => { balls[1].thrown = true; playAnimation({ duration: 15, onComplete: () => { balls[1].origVx = balls[1].vx; balls[1].origVy = balls[1].vy; balls[1].vx = 0; balls[1].vy = 0; balls[1].thrown = false; loadScenario('decision_defense_noball'); } }); }
        },
        decision_defense: {
            dialog: "【暫停】<br>球朝你飛來了！你現在手上**有球**，要怎麼應對？",
            choices: [
                { text: "用手上的球去「擋球 (Block)」", action: () => { balls[1].thrown = true; balls[1].vx = balls[1].origVx; balls[1].vy = balls[1].origVy; playAnimation({ duration: 30, onHit: (t) => { balls[1].thrown = false; balls[1].x = pObj.x; balls[1].y = pObj.y - 22; }, onComplete: () => { loadScenario('success_block'); } }); } },
                { text: "嘗試用雙手「接球 (Catch)」", action: () => { balls[1].thrown = true; balls[1].vx = balls[1].origVx; balls[1].vy = balls[1].origVy; playAnimation({ duration: 30, onHit: (t) => { pObj.isOut = true; }, onComplete: () => { loadScenario('fail_catch_with_ball'); } }); } }
            ]

            },
            dialog: "✅ 沒錯！不管一個人拿幾顆球，他都只算一個順位。<br><br>我們來看情境三：場上有 5 個人，只有 2 顆球。最左邊拿 1 顆，**你(最右邊)拿 1 顆**，中間三個全部空手。",
            action: () => loadScenario('level4_s3')
        },
        level4_s3: {
            dialog: "【情境三：長距離跨度】<br>左(1球)、空、空、空、你(1球)。<br><br>這時隊長大喊：**「戰術比 2 ！」**<br>請問這次該由誰出手攻擊？",
            choices: [
                { text: "是我！(我是最右邊的第 2 顆球)", action: () => { pObj.hasBall = false; balls[0] = {x: pObj.x, y: pObj.y, thrown: true, vx: 0, vy: -6}; playAnimation({ duration: 40, onComplete: () => { balls[0].thrown = false; loadScenario('level4_s4_intro'); } }); } }, 
                { text: "中間空手的隊友", action: () => loadScenario('fail_l4_s3') }
            ]
        },
        fail_l4_s3: { dialog: "❌ 算錯啦！<br>中間的隊友都是空手，直接跳過不數！所以從左邊數過來的「第 2 個有球的人」，確確實實就是在最右邊的你！", choices: [{ text: "重新嘗試", action: () => loadScenario('level4_s3_intro') }] },
        level4_s4_intro: {
            setup: () => {
                teamBlue = []; teamRed = []; balls = []; let spacing = courtDrawW / 4; 
                for(let i=0; i<3; i++) { let isUser = (i === 1); let hasBall = (i===0 || i===1); let ballCount = (i===0) ? 2 : (i===1 ? 1 : 0); let char = { x: courtDrawX + spacing*(i+1), y: courtDrawY + courtDrawH - 50, color: isUser?'#3B82F6':'#60A5FA', hasBall: hasBall, ballCount: ballCount, team: 'blue', isUser: isUser, name: isUser?'你':'' }; teamBlue.push(char); if(isUser) pObj = char; }
                for(let i=0; i<3; i++) teamRed.push({ x: courtDrawX + spacing*(i+1), y: courtDrawY + 50, color: '#F87171', hasBall: false, team: 'red' });
                drawScene();
            },
            dialog: "✅ 正確！距離再遠，只要中間的人空手就直接跳過。<br><br>最後是情境四，綜合考驗！<br>場上 3 個人，左邊的隊友拿了 **2 顆球**，你(中間)拿了 1 顆，右邊空手。",
            action: () => loadScenario('level4_s4')
        },
        level4_s4: {
            dialog: "【情境四：先看人還是先看球？】<br>左邊隊友(2球)、你(1球)、右邊隊友(空手)。<br><br>這時隊長大喊：**「戰術比 2 ！」**<br>請問這次該由誰出手攻擊？",
            choices: [
                { text: "是我！(我是第2個人)", action: () => { pObj.hasBall = false; balls[0] = {x: pObj.x, y: pObj.y, thrown: true, vx: 0, vy: -6}; playAnimation({ duration: 40, onComplete: () => { balls[0].thrown = false; loadScenario('level4_end'); } }); } }, 
                { text: "左邊的隊友！(他手上的第2顆球)", action: () => loadScenario('fail_l4_s4') }
            ]
        },
        fail_l4_s4: { dialog: "❌ 搞錯啦！<br>記住最高指導原則：**先看人，再看球**！<br>左邊的隊友是第 1 個人，而你是從左邊數過來的第 2 個人。所以當戰術喊「2」時，是由身為第 2 個人的你，出手攻擊！", choices: [{ text: "重新嘗試", action: () => loadScenario('level4_s4_intro') }] },
        level4_end: { dialog: "🎉 恭喜通關第四關！<br>你學會了最核心的戰術暗號邏輯：<br>1. **先看人，再看球**：永遠先以「從左至右的人」為基準。<br>2. 空手者跳過不數。<br>3. 一人多球時，依然只佔一個順位。<br><br>這能讓團隊的集火攻擊無懈可擊！", choices: [{ text: "回到首頁", action: () => { titleScreen.style.display = 'flex'; } }] }
    };

    function showDialog(text, hasNextBtn = false) {
        dialogText.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b class="text-yellow-300">$1</b>');
        choicesContainer.style.display = 'none'; nextBtn.style.display = hasNextBtn ? 'block' : 'none';
        minimizeBtn.classList.add('hidden'); // 一般對話時隱藏
        dialogBox.classList.remove('shrunk');
        if(isMinimized) minimizeBtn.click(); // 確保文字區塊展開
        setTimeout(() => { dialogBox.classList.add('show'); }, 50);
    }

    function showChoices(choices) {
        choicesContainer.innerHTML = '';
        choices.forEach((choice, index) => {
            let btn = document.createElement('button'); btn.className = `choice-btn`;
            btn.innerHTML = `<span class="number">${index + 1}</span><span>${choice.text}</span>`;
            btn.onclick = () => {
                const allBtns = choicesContainer.querySelectorAll('.choice-btn');
                allBtns.forEach(b => b.style.pointerEvents = 'none');
                choice.action();
            };
            choicesContainer.appendChild(btn);
        });
        choicesContainer.style.display = 'flex'; nextBtn.style.display = 'none';
        
        // 有選項時顯示看場地按鈕
        minimizeBtn.classList.remove('hidden');
        if(isMinimized) minimizeBtn.click(); // 確保選項區塊展開

        dialogBox.classList.remove('shrunk');
    }

    function loadScenario(scenarioId, isBack = false) {
        if (!isBack && currentScenarioId) historyStack.push(currentScenarioId);
        currentScenarioId = scenarioId; currentScenarioNode = scenarios[scenarioId];
        backBtn.classList.toggle('hidden', historyStack.length === 0);
        
        if (currentScenarioNode.setup) currentScenarioNode.setup();
        
        if (currentScenarioNode.choices) {
            dialogText.innerHTML = currentScenarioNode.dialog.replace(/\*\*(.*?)\*\*/g, '<b class="text-yellow-300">$1</b>');
            showChoices(currentScenarioNode.choices); dialogBox.classList.add('show');
        } else if (currentScenarioNode.action) {
            showDialog(currentScenarioNode.dialog, true);
            nextBtn.onclick = () => {
                nextBtn.style.pointerEvents = 'none';
                dialogBox.classList.remove('show');
                setTimeout(() => { 
                    nextBtn.style.pointerEvents = 'auto'; 
                    currentScenarioNode.action(); 
                }, 300); 
            };
        }
    }

    // 確保函式綁定到全域，避免點擊失敗
    window.startGame = function(scenarioId) {
        historyStack = []; currentScenarioId = null;
        titleScreen.style.display = 'none'; resizeCanvas(); loadScenario(scenarioId);
    };

    // 防止腳本錯誤靜默失敗
    window.onerror = function(msg, url, line) {
        console.error("腳本錯誤: " + msg + " 在行數: " + line);
        alert("哦不！程式碼似乎沒有複製完整（發生語法錯誤）。請確保你有從第一行複製到最後一行的 </html> 喔！");
    };

</script>
</body>
</html>
