<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>台中美式躲避球協會-新手入門攻略</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            background-color: #111827; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            touch-action: none; 
        }
        #game-container { 
            position: relative; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            background-color: #1a202c; 
        }
        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
        }
        
        /* 對話框 UI */
        #dialog-layer { 
            position: absolute; 
            inset: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center;     
            pointer-events: none; 
            padding: 15px; 
            z-index: 10; 
        }
        .dialog-box { 
            background: rgba(17, 24, 39, 0.95); 
            border: 2px solid #FBBF24; 
            border-radius: 12px; 
            padding: 16px 20px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.7); 
            pointer-events: auto; 
            transform: scale(0.8) translateY(20px); 
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            max-height: 85vh; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            transform-origin: center center; 
            width: 100%;
            max-width: 28rem;
        }
        .dialog-box.show { 
            transform: scale(1) translateY(0); 
            opacity: 1; 
        }
        .dialog-box.show.shrunk { 
            transform: translateY(35vh) scale(0.7); 
            opacity: 0.4; 
            pointer-events: none; 
            border-color: rgba(251, 191, 36, 0.3);
        }

        /* 縮小看場地狀態 */
        .dialog-box.minimized {
            transform: translateY(38vh) scale(0.9) !important;
            opacity: 0.85 !important;
            border-color: rgba(251, 191, 36, 0.6);
        }
        
        .choice-btn { 
            background: #374151; 
            border: 1px solid #4B5563; 
            color: white; 
            padding: 10px 14px; 
            border-radius: 8px; 
            margin-top: 8px; 
            width: 100%; 
            text-align: left; 
            transition: all 0.2s; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            font-size: 14px; 
        }
        .choice-btn:active { background: #4B5563; border-color: #FBBF24; transform: scale(0.98); }
        
        .choice-btn .number { 
            background: #FBBF24; 
            color: black; 
            font-weight: bold; 
            width: 22px; 
            height: 22px; 
            border-radius: 50%; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin-right: 10px; 
            flex-shrink: 0; 
            font-size: 13px; 
        }

        .coach-avatar { 
            width: 40px; 
            height: 40px; 
            background: #EF4444; 
            border-radius: 50%; 
            border: 2px solid white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 20px; 
            margin-right: 10px; 
            flex-shrink: 0; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        /* 關卡選單 3x2 網格排版 */
        .level-btn {
            background: rgba(37, 99, 235, 0.8);
            border: 2px solid #3B82F6;
            padding: 12px 10px;
            border-radius: 12px;
            width: 100%;
            text-align: center;
            font-weight: bold;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 85px;
        }
        .level-btn:active { transform: scale(0.95); filter: brightness(1.2); }

    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="dialog-layer">
            <div id="dialog-box" class="dialog-box mx-auto w-full max-w-md">
                
                <div class="flex justify-between items-center border-b border-gray-600 pb-2 mb-2">
                    <h3 class="text-yellow-400 font-bold text-[14px] flex items-center">
                        <span class="mr-2 text-lg">👨‍🏫</span> 戰術教練
                    </h3>
                    <div class="flex gap-2">
                        <button id="minimize-btn" class="text-[12px] bg-indigo-600 hover:bg-indigo-500 text-white px-2 py-1 rounded transition shadow border border-indigo-500 hidden">👁️ 看場地</button>
                        <button id="back-btn" class="text-[12px] bg-gray-700 hover:bg-gray-500 text-white px-2 py-1 rounded transition shadow border border-gray-500 hidden">⬅️ 上一步</button>
                        <button id="home-btn" class="text-[12px] bg-gray-700 hover:bg-gray-500 text-white px-2 py-1 rounded transition shadow border border-gray-500">🏠 首頁</button>
                    </div>
                </div>

                <div id="dialog-body">
                    <div class="flex items-start mb-1 relative">
                        <div class="flex-1 w-full">
                            <div id="dialog-text" class="text-gray-100 text-[14px] leading-[1.5]">歡迎來到美式躲避球戰術板！</div>
                        </div>
                    </div>
                    <div id="choices-container" class="mt-1 hidden flex-col"></div>
                    <button id="next-btn" class="mt-3 bg-yellow-500 hover:bg-yellow-400 text-black font-bold py-2 px-6 rounded-full self-end ml-auto block shadow-lg text-[14px]">
                        繼續
                    </button>
                </div>

            </div>
        </div>

        <div id="title-screen" class="absolute inset-0 bg-gray-900/95 flex flex-col items-center justify-center pointer-events-auto z-50 p-4 sm:p-6 overflow-y-auto">
            
            <img src="TCCD.png" alt="台中美式躲避球協會 LOGO" class="w-28 h-28 sm:w-36 sm:h-36 object-contain mb-3 mt-4 bg-white p-2 rounded-2xl shadow-[0_0_20px_rgba(251,191,36,0.3)]" onerror="this.onerror=null; this.outerHTML='<div class=\'text-5xl mb-2 mt-4 drop-shadow-md\'>🏐</div>';">
            
            <h1 class="text-3xl sm:text-5xl font-extrabold text-yellow-400 mb-1 text-center leading-tight drop-shadow-lg tracking-wide">
                台中美式躲避球協會
            </h1>
            <h2 class="text-xl sm:text-2xl text-white font-bold mb-6 mt-1 opacity-90">
                新手入門攻略
            </h2>
            
            <p class="text-gray-300 text-center mb-8 text-[14px] sm:text-[15px] leading-relaxed max-w-md">
                模擬真實賽場局勢，學習最純正的 WDBF 規則。<br>你需要根據戰術，做出正確的判斷！
            </p>
            
            <div class="w-full max-w-4xl grid grid-cols-2 md:grid-cols-3 gap-3 sm:gap-4 mt-2 px-2">
                <button class="level-btn bg-gray-700 border-gray-500 hover:bg-gray-600" onclick="startGame('court_intro')">
                    <span class="text-base sm:text-lg">前導篇</span>
                    <span class="text-[12px] sm:text-[13px] font-normal text-gray-300 mt-1">場地標線解密</span>
                </button>
                <button class="level-btn bg-gray-600 border-gray-400 hover:bg-gray-500" onclick="startGame('basic_abcd')">
                    <span class="text-base sm:text-lg">基礎篇</span>
                    <span class="text-[12px] sm:text-[13px] font-normal text-gray-300 mt-1">ABCD與誠實制</span>
                </button>
                <button class="level-btn bg-blue-600 border-blue-400 hover:bg-blue-500" onclick="startGame('intro')">
                    <span class="text-base sm:text-lg">第一關</span>
                    <span class="text-[12px] sm:text-[13px] font-normal text-blue-100 mt-1">開局與基礎攻防</span>
                </button>
                <button class="level-btn bg-purple-600 border-purple-400 hover:bg-purple-500" onclick="startGame('level2_intro')">
                    <span class="text-base sm:text-lg">第二關</span>
                    <span class="text-[12px] sm:text-[13px] font-normal text-purple-100 mt-1">進階觀念與危機</span>
                </button>
                <button class="level-btn bg-green-600 border-green-400 hover:bg-green-500" onclick="startGame('level3_intro')">
                    <span class="text-base sm:text-lg">第三關</span>
                    <span class="text-[12px] sm:text-[13px] font-normal text-green-100 mt-1">彈射球與救援</span>
                </button>
                <button class="level-btn bg-orange-600 border-orange-400 hover:bg-orange-500" onclick="startGame('level4_intro')">
                    <span class="text-base sm:text-lg">第四關</span>
                    <span class="text-[12px] sm:text-[13px] font-normal text-orange-100 mt-1">攻擊戰術與暗號</span>
                </button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // UI 元素
    const dialogBox = document.getElementById('dialog-box');
    const dialogBody = document.getElementById('dialog-body');
    const dialogText = document.getElementById('dialog-text');
    const choicesContainer = document.getElementById('choices-container');
    const nextBtn = document.getElementById('next-btn');
    const titleScreen = document.getElementById('title-screen');
    const backBtn = document.getElementById('back-btn');
    const homeBtn = document.getElementById('home-btn');
    const minimizeBtn = document.getElementById('minimize-btn');

    let COURT_WIDTH, COURT_HEIGHT, CENTER_Y, ATTACK_LINE_P1_Y, ATTACK_LINE_P2_Y; 
    let courtDrawX, courtDrawY, courtDrawW, courtDrawH;

    function resizeCanvas() {
        COURT_WIDTH = window.innerWidth;
        COURT_HEIGHT = window.innerHeight;
        canvas.width = COURT_WIDTH;
        canvas.height = COURT_HEIGHT;
        CENTER_Y = COURT_HEIGHT / 2;
        let marginX = COURT_WIDTH * 0.05;
        let marginY = COURT_HEIGHT * 0.08;
        courtDrawW = COURT_WIDTH - marginX * 2;
        if(courtDrawW > 500) { courtDrawW = 500; marginX = (COURT_WIDTH - 500) / 2; }
        courtDrawH = COURT_HEIGHT - marginY * 2;
        courtDrawX = marginX; courtDrawY = marginY;
        let halfCourtH = courtDrawH / 2;
        ATTACK_LINE_P1_Y = CENTER_Y + halfCourtH * 0.33; 
        ATTACK_LINE_P2_Y = CENTER_Y - halfCourtH * 0.33; 
        drawScene();
    }
    window.addEventListener('resize', resizeCanvas);

    let isAnimating = false, currentAnimation = null, animationTimer = 0;
    let teamBlue = [], teamRed = [], balls = []; 
    let pObj = null, eObj = null, tObj = null, outTeammate = null; 
    let currentScenarioNode = null, loopRunning = false, highlightMode = null; 
    let historyStack = [], currentScenarioId = null;
    let isMinimized = false;

    resizeCanvas();

    // --- 縮小看場地功能 ---
    minimizeBtn.addEventListener('click', () => {
        isMinimized = !isMinimized;
        if (isMinimized) {
            dialogBody.style.display = 'none';
            dialogBox.classList.add('minimized');
            minimizeBtn.innerHTML = '💬 回答問題';
            minimizeBtn.classList.replace('bg-indigo-600', 'bg-yellow-500');
            minimizeBtn.classList.replace('border-indigo-500', 'border-yellow-400');
            minimizeBtn.classList.replace('hover:bg-indigo-500', 'hover:bg-yellow-400');
            minimizeBtn.classList.replace('text-white', 'text-black');
            minimizeBtn.classList.add('font-bold');
        } else {
            dialogBody.style.display = 'block';
            dialogBox.classList.remove('minimized');
            minimizeBtn.innerHTML = '👁️ 看場地';
            minimizeBtn.classList.replace('bg-yellow-500', 'bg-indigo-600');
            minimizeBtn.classList.replace('border-yellow-400', 'border-indigo-500');
            minimizeBtn.classList.replace('hover:bg-yellow-400', 'hover:bg-indigo-500');
            minimizeBtn.classList.replace('text-black', 'text-white');
            minimizeBtn.classList.remove('font-bold');
        }
    });

    backBtn.addEventListener('click', () => {
        if (historyStack.length > 0) {
            let prevScenario = historyStack.pop();
            dialogBox.classList.remove('show');
            setTimeout(() => { loadScenario(prevScenario, true); }, 300);
        }
    });

    homeBtn.addEventListener('click', () => {
        dialogBox.classList.remove('show');
        setTimeout(() => {
            titleScreen.style.display = 'flex';
            balls.forEach(b => b.thrown = false);
            isAnimating = false;
            highlightMode = null;
        }, 300);
    });

    function drawScene() {
        ctx.fillStyle = '#111827';
        ctx.fillRect(0, 0, COURT_WIDTH, COURT_HEIGHT);
        ctx.fillStyle = '#db9c6e'; 
        ctx.fillRect(courtDrawX, courtDrawY, courtDrawW, courtDrawH);
        ctx.lineWidth = 4; ctx.strokeStyle = '#FFFFFF'; ctx.strokeRect(courtDrawX, courtDrawY, courtDrawW, courtDrawH);
        ctx.beginPath(); ctx.moveTo(courtDrawX, CENTER_Y); ctx.lineTo(courtDrawX + courtDrawW, CENTER_Y); ctx.lineWidth = 6; ctx.stroke();
        ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(courtDrawX, ATTACK_LINE_P2_Y); ctx.lineTo(courtDrawX + courtDrawW, ATTACK_LINE_P2_Y); ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)'; ctx.stroke();
        ctx.beginPath(); ctx.moveTo(courtDrawX, ATTACK_LINE_P1_Y); ctx.lineTo(courtDrawX + courtDrawW, ATTACK_LINE_P1_Y); ctx.stroke();

        ctx.fillStyle = 'rgba(239, 68, 68, 0.1)'; ctx.fillRect(courtDrawX, courtDrawY, courtDrawW, courtDrawH / 2);
        ctx.fillStyle = 'rgba(59, 130, 246, 0.1)'; ctx.fillRect(courtDrawX, CENTER_Y, courtDrawW, courtDrawH / 2);

        if (highlightMode) {
            let pulseAlpha = (Math.sin(Date.now() / 150) + 1) / 2 * 0.6 + 0.2;
            if (highlightMode === 'boundary') {
                ctx.lineWidth = 8; ctx.strokeStyle = `rgba(239, 68, 68, ${pulseAlpha})`; ctx.strokeRect(courtDrawX, courtDrawY, courtDrawW, courtDrawH);
            } else if (highlightMode === 'center') {
                ctx.lineWidth = 10; ctx.strokeStyle = `rgba(251, 191, 36, ${pulseAlpha})`; ctx.beginPath(); ctx.moveTo(courtDrawX, CENTER_Y); ctx.lineTo(courtDrawX + courtDrawW, CENTER_Y); ctx.stroke();
            } else if (highlightMode === 'attack') {
                ctx.lineWidth = 8; ctx.strokeStyle = `rgba(59, 130, 246, ${pulseAlpha})`; ctx.beginPath(); ctx.moveTo(courtDrawX, ATTACK_LINE_P1_Y); ctx.lineTo(courtDrawX + courtDrawW, ATTACK_LINE_P1_Y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(courtDrawX, ATTACK_LINE_P2_Y); ctx.lineTo(courtDrawX + courtDrawW, ATTACK_LINE_P2_Y); ctx.stroke();
            }
        }

        balls.forEach(b => { if (!b.isHeld && !b.thrown && !b.hidden) drawBall(b.x, b.y); });
        balls.forEach(b => { if (b.thrown) drawBall(b.x, b.y, true); });
        teamRed.forEach(char => { drawCharacter(char); });
        teamBlue.forEach(char => { drawCharacter(char); });
    }

    function drawCharacter(char) {
        ctx.save();
        if (char.isOut) {
            ctx.globalAlpha = 0.3;
            if (char.team === 'blue') ctx.translate(courtDrawX - 20, courtDrawY + courtDrawH - 40);
            else ctx.translate(courtDrawX + courtDrawW + 20, courtDrawY + 40);
        } else { ctx.translate(char.x, char.y); }
        ctx.beginPath(); ctx.arc(0, 0, 15, 0, Math.PI*2); ctx.fillStyle = char.color; ctx.fill();
        ctx.lineWidth = char.isUser ? 3 : 2; ctx.strokeStyle = char.isUser ? '#FBBF24' : '#FFF'; ctx.stroke();
        if (char.hasBall) {
            ctx.beginPath(); let ballOffsetX = 12; let ballOffsetY = char.team === 'red' ? 10 : -10; 
            ctx.arc(ballOffsetX, ballOffsetY, 7, 0, Math.PI*2); ctx.fillStyle = '#F97316'; ctx.fill(); ctx.stroke();
            if (char.ballCount > 1) { ctx.beginPath(); ctx.arc(-ballOffsetX, ballOffsetY, 7, 0, Math.PI*2); ctx.fillStyle = '#F97316'; ctx.fill(); ctx.stroke(); }
        }
        ctx.fillStyle = 'white';
        if (char.team === 'red') { ctx.beginPath(); ctx.arc(-5, 6, 2.5, 0, Math.PI*2); ctx.arc(5, 6, 2.5, 0, Math.PI*2); ctx.fill(); }
        else { ctx.beginPath(); ctx.arc(-5, -6, 2.5, 0, Math.PI*2); ctx.arc(5, -6, 2.5, 0, Math.PI*2); ctx.fill(); }
        ctx.restore();
        if (char.name && !char.isOut) {
            ctx.fillStyle = char.isUser ? '#FBBF24' : '#FFF'; ctx.font = 'bold 12px Arial'; ctx.textAlign = 'center';
            let textY = char.team === 'red' ? char.y - 22 : char.y + 26; ctx.fillText(char.name, char.x, textY);
        }
    }

    function drawBall(x, y, isFlying = false) {
        ctx.beginPath(); ctx.arc(x, y, 7, 0, Math.PI*2); ctx.fillStyle = '#F97316'; ctx.fill(); ctx.lineWidth = 1; ctx.strokeStyle = '#000'; ctx.stroke();
        if (isFlying) { ctx.beginPath(); ctx.arc(x, y, 9, 0, Math.PI*2); ctx.fillStyle = 'rgba(249, 115, 22, 0.3)'; ctx.fill(); }
    }

    function easeInOutQuad(t) { return t<.5 ? 2*t*t : -1+(4-2*t)*t; }

    function animateLoop() {
        let stillAnimating = false;
        
        if (isAnimating && currentAnimation) {
            animationTimer += 0.5; 
            let progress = currentAnimation.duration > 0 ? animationTimer / currentAnimation.duration : 1;
            if (progress > 1) progress = 1;
            
            let easedProgress = easeInOutQuad(progress);
            if (currentAnimation.onFrame) currentAnimation.onFrame(easedProgress);
            
            if (progress === 1) { 
                isAnimating = false; 
                if (currentAnimation.onComplete) {
                    currentAnimation.onComplete(); 
                }
            } else { 
                stillAnimating = true; 
            }
        }
        
        let ballsFlying = balls.some(b => b.thrown);
        if (ballsFlying) {
            balls.forEach(b => {
                if (b.thrown) {
                    b.x += b.vx * 0.5; b.y += b.vy * 0.5;
                    let hitTarget = null; let allChars = [...teamBlue, ...teamRed];
                    for (let char of allChars) { 
                        if (!char.isOut && char !== b.thrower && Math.hypot(char.x - b.x, char.y - b.y) < 20) { hitTarget = char; break; } 
                    }
                    
                    if (hitTarget) { 
                        b.thrown = false; 
                        if (currentAnimation && currentAnimation.onHit) {
                            currentAnimation.onHit(hitTarget); 
                        }
                    } else if (b.y > courtDrawY + courtDrawH || b.y < courtDrawY || b.x < courtDrawX || b.x > courtDrawX + courtDrawW) { 
                        b.thrown = false; 
                        if (currentAnimation && currentAnimation.onMiss) currentAnimation.onMiss();
                    }
                }
            });
        }
        
        drawScene();
        
        if (stillAnimating || ballsFlying || highlightMode) { 
            loopRunning = true; requestAnimationFrame(animateLoop); 
        } else { 
            loopRunning = false; 
        }
    }

    function playAnimation(animDef) { 
        currentAnimation = animDef; 
        animationTimer = 0; 
        isAnimating = true; 
        if (!loopRunning) { loopRunning = true; requestAnimationFrame(animateLoop); } 
    }

    // ==========================================
    // 完整還原的高品質劇本庫
    // ==========================================
    const scenarios = {
        // --- 前導篇 ---
        court_intro: {
            setup: () => { teamBlue = []; teamRed = []; balls = []; highlightMode = null; let midX = courtDrawX + courtDrawW / 2; pObj = { x: midX, y: courtDrawY + courtDrawH - 50, color: '#3B82F6', hasBall: false, isOut: false, team: 'blue', isUser: true, name: '你' }; teamBlue.push(pObj); eObj = { x: midX, y: courtDrawY + 50, color: '#EF4444', hasBall: false, isOut: false, team: 'red', isUser: false, name: '對手' }; teamRed.push(eObj); drawScene(); },
            dialog: "【前導：場地與尺寸解密】<br>上場前，先來認識國際標準 (WDBF) 的場地規格！<br><svg viewBox='0 0 200 110' xmlns='http://www.w3.org/2000/svg' class='w-full max-w-[220px] mx-auto my-3 border
